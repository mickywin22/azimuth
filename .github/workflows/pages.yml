name: Deploy site to GitHub Pages

# Builds the public static site (scripts/build_site.py -> ./_site) and publishes it
# to GitHub Pages on every push to main, plus a manual trigger.
#
# READY-TO-FLIP GATE: this workflow only DEPLOYS once GitHub Pages is enabled in the
# repo settings (Settings -> Pages -> Source: "GitHub Actions"). Until Michael enables
# that, the `deploy` job fails by design and nothing is published — the site stays
# private. Enabling Pages is Michael's manual, explicitly-confirmed step. See
# docs/deploy.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token scopes required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    # Gate: the repo is private (public flip is Michael's gated decision), so GitHub Pages cannot
    # publish -> the deploy fails every push. Skip (not fail) while private; auto-runs once flipped public.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # `site` (Markdown renderer) + `ld` (rdflib) — both DEV/CI-only; the runtime stays
      # pure-stdlib. `ld` powers the linked-data export step below.
      - name: Install site build deps
        run: uv pip install --system -e ".[site,ld]"

      - name: Build site
        run: python scripts/build_site.py --out _site

      # Publish the RDF graph BESIDE the static site: schema.ttl + data.ttl + the composed
      # context, lifted from the vault/ OKF bundle (Vault-LD OKF profile, SPEC Appendix B).
      # This whole build job is flip-gated (`if: !repository.private`), so the .ttl only ever
      # deploy once Michael flips the repo public — nothing publishes early.
      - name: Export linked data (schema.ttl + data.ttl) beside the site
        run: python scripts/build_rdf.py --out _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
