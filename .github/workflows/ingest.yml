name: L1 Ingest

# Daily autonomous L1 ingest: pull every surfaced (guardrail-passing) WorldMonitor
# subset, write dated L1 notes under vault/01 Sources/YYYY-MM-DD/, and commit them.
# Runs on GitHub infra so it survives Michael's box being powered off (same posture as
# the Apex Supabase keep-alive cron). WorldMonitor uses an anonymous session-mint, so no
# API key / secret is required.

on:
  schedule:
    # 06:12 UTC daily — off the top-of-hour rush, after most upstream feeds refresh.
    - cron: "12 6 * * *"
  workflow_dispatch: {}

# The job commits new L1 notes back to the repo, so it needs write access.
# Commit the new L1 notes (contents) and raise a tracking issue if the engine dies (issues).
permissions:
  contents: write
  issues: write

# Never let two ingest runs race on the same branch's working tree.
concurrency:
  group: l1-ingest
  cancel-in-progress: false

jobs:
  ingest:
    name: Daily L1 ingest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install runtime dependencies
        run: uv pip install --system -e .

      - name: Run live L1 ingest against WorldMonitor
        run: python scripts/run_ingest.py --base-url https://api.worldmonitor.app

      # Refresh the benchmark FOIL corpus (the compared forecast/intelligence product) and
      # regenerate the Benchmark brief from the fresh bundle, so the facts-vs-forecast head-
      # to-head stays current alongside the TOP5 demonstrator. Fail-soft: a failed live foil
      # pull leaves the committed snapshot untouched and never breaks the daily ingest.
      - name: Refresh benchmark foil snapshot (compared product)
        continue-on-error: true
        run: |
          python scripts/pull_benchmark_foils.py || echo "foil pull failed — keeping prior snapshot"
          python scripts/build_benchmark.py || echo "benchmark brief rebuild skipped"

      # Re-derive the DETERMINISTIC artifacts that rest on the freshly-pulled L1 day, so they
      # never lag the data underneath them. The knowledge graph embeds the latest L1 day's
      # entity provenance (build_graph reads the newest source notes) and the brief index
      # records each brief's last-updated date (Benchmark.md just changed above) — both are
      # mechanical, so they regenerate here every day rather than waiting for the weekly L2
      # curator. This keeps `build_graph.py --check` and `build_brief_index.py --check` green
      # on main daily instead of reddening for ~6 days out of every 7. (L2 brief *narrative*
      # stays weekly — that is the curator's job, gated by the synthesis-freshness --overdue
      # tolerance, not regenerated here.)
      - name: Regenerate deterministic artifacts (knowledge graph + brief index + autonomy)
        run: |
          python scripts/build_graph.py
          python scripts/build_brief_index.py
          python scripts/build_autonomy.py

      - name: Commit new L1 notes + refreshed benchmark + re-derived artifacts
        run: |
          git config user.name  "azimuth-ingest[bot]"
          git config user.email "azimuth-ingest@users.noreply.github.com"
          git add "vault/01 Sources/" "sources/benchmark/foils.json" "vault/02 Briefs/Benchmark.md" \
                  "vault/02 Briefs/README.md" "site/graph.json" "site/graph.html" \
                  "site/autonomy.json" "site/autonomy.html"
          if git diff --cached --quiet; then
            echo "No new or changed L1 notes / benchmark / derived artifacts — nothing to commit."
          else
            DAY="$(date -u +%F)"
            git commit -m "chore(ingest): daily L1 pull + benchmark + graph/index/autonomy refresh ${DAY} (WorldMonitor)"
            git push
          fi

      # Liveness gate: after a fresh pull the newest committed L1 day must be within
      # tolerance. If it is not (feed dead, clock skew, an ingest that ran but wrote
      # nothing), fail the job so the alarm below fires — a stale engine must be loud.
      - name: Verify the ingest is alive
        run: python scripts/check_ingest_liveness.py --check

      # A failing daily ingest is the single most important thing to surface for KR-C
      # ("keep L1 ingest operating"): the engine every brief rests on is down. Open (or
      # update) one tracking issue so it cannot fail silently. Dedup by the ingest-alarm
      # label so repeated failures append instead of spamming new issues.
      - name: Alarm on ingest failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const day = new Date().toISOString().slice(0, 10);
            const title = "azimuth L1 ingest failing";
            const body = [
              `The daily L1 ingest workflow failed on ${day} (run ${context.runId}).`,
              "",
              "The L1-ingest engine that feeds every L2 brief is down. Check the run:",
              `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "ingest-alarm",
            });
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["ingest-alarm"],
              });
            }
