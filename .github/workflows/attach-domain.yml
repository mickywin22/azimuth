name: Attach custom domain
# One-shot operational workflow (manual dispatch only): attach azimuth.emi-factory.dev to the
# Cloudflare Pages project using the repo's existing CLOUDFLARE_API_TOKEN (Pages Edit scope).
# The zone lives in the same Cloudflare account, so the domain activates once the CNAME
# `azimuth -> azimuth.pages.dev` exists; step 2 TRIES to create it and reports honestly when
# the token lacks Zone.DNS scope (then it is a 30-second dashboard step for the owner).

on:
  workflow_dispatch: {}

permissions: {}

jobs:
  attach:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DOMAIN: azimuth.emi-factory.dev
      ZONE: emi-factory.dev
      PROJECT: azimuth
    steps:
      - name: Attach domain to the Pages project
        run: |
          # Self-resolve the account id from the token (the secret arrived empty on the first
          # dispatch -- the token itself knows its account memberships).
          if [ -z "${CF_ACCOUNT}" ]; then
            CF_ACCOUNT=$(curl -sS "https://api.cloudflare.com/client/v4/accounts" \
              -H "Authorization: Bearer ${CF_TOKEN}" | python3 -c 'import json,sys; d=json.load(sys.stdin); r=d.get("result") or []; print(r[0]["id"] if r else "")')
            echo "resolved account id: ${CF_ACCOUNT:0:6}..."
          fi
          echo "CF_ACCOUNT=${CF_ACCOUNT}" >> "$GITHUB_ENV"
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/${PROJECT}/domains" \
            -H "Authorization: Bearer ${CF_TOKEN}" -H "Content-Type: application/json" \
            --data "{\"name\":\"${DOMAIN}\"}" | python3 -c 'import json,sys; d=json.load(sys.stdin); print("attach success:", d.get("success"), "| errors:", d.get("errors"))'

      - name: Try to create the CNAME (reports if token lacks Zone.DNS scope)
        run: |
          ZID=$(curl -sS "https://api.cloudflare.com/client/v4/zones?name=${ZONE}" \
            -H "Authorization: Bearer ${CF_TOKEN}" | python3 -c 'import json,sys; d=json.load(sys.stdin); r=d.get("result") or []; print(r[0]["id"] if r else "")')
          if [ -z "$ZID" ]; then
            echo "zone lookup returned nothing -- token likely has no Zone scope."
            echo "MANUAL STEP: Cloudflare dashboard -> ${ZONE} -> DNS -> add CNAME ${DOMAIN%%.*} -> ${PROJECT}.pages.dev (proxied)."
            exit 0
          fi
          curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${ZID}/dns_records" \
            -H "Authorization: Bearer ${CF_TOKEN}" -H "Content-Type: application/json" \
            --data "{\"type\":\"CNAME\",\"name\":\"${DOMAIN}\",\"content\":\"${PROJECT}.pages.dev\",\"proxied\":true}" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print("cname success:", d.get("success"), "| errors:", d.get("errors"))'

      - name: Domain status
        run: |
          curl -sS "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/${PROJECT}/domains" \
            -H "Authorization: Bearer ${CF_TOKEN}" | python3 -c 'import json,sys; d=json.load(sys.stdin); [print(x.get("name"), "->", x.get("status")) for x in (d.get("result") or [])]'
