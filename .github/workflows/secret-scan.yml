name: Secret Scan

# Public-flip HARD gate (C1). Runs gitleaks over the FULL git history plus the
# pure-stdlib belt-and-suspenders scanner. Both must be CLEAN for the gate to
# pass. Enforced on every push / PR to main so the gate cannot rot after the
# repo goes public — a leaked key committed and reverted still trips it.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — gitleaks scans every commit, not just HEAD

      - name: gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # No GITLEAKS_LICENSE needed: this is a personal/public repo, not an org.

  stdlib-scan:
    name: stdlib secret scan (no-binary fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pure-stdlib — no install. Scans every reachable blob + the working tree.
      # Exit 1 on any real secret blocks the merge / flip.
      - name: Run scan_secrets.py over history + working tree
        run: python scripts/scan_secrets.py --report

  privacy-scan:
    name: private-leakage scan (C1b — owner-private context)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Sibling of the secret scan: gitleaks finds leaked *credentials*; this
      # finds leaked *owner-private context* — the owner's home paths, personal
      # email, and local-machine hook commands that must not ship to a public
      # repo. HARD findings exit 1 and block the merge / flip; advisory findings
      # (internal IQ refs) print but do not fail.
      - name: Run scan_private_leakage.py over history + working tree
        run: python scripts/scan_private_leakage.py --report

  flip-readiness:
    name: public-flip go/no-go (all fleet gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The single go/no-go aggregator (C1 secret · C1b private-worktree · C2 license ·
      # C3 source-guardrail · C4 ingest-liveness). Exit 0 only if every fleet-owned gate is
      # GREEN — so a regression in ANY gate fails this job, and the readiness table the flip
      # decision reads stays honest on every push/PR (pure stdlib, no install).
      - name: Run check_flip_readiness.py
        run: python scripts/check_flip_readiness.py
