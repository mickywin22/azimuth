name: Secret Scan

# Public-flip HARD gate (C1). Runs gitleaks over the FULL git history plus the
# pure-stdlib belt-and-suspenders scanner. Both must be CLEAN for the gate to
# pass. Enforced on every push / PR to main so the gate cannot rot after the
# repo goes public — a leaked key committed and reverted still trips it.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — gitleaks scans every commit, not just HEAD

      - name: gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # No GITLEAKS_LICENSE needed: this is a personal/public repo, not an org.

  stdlib-scan:
    name: stdlib secret scan (no-binary fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pure-stdlib — no install. Scans every reachable blob + the working tree.
      # Exit 1 on any real secret blocks the merge / flip.
      - name: Run scan_secrets.py over history + working tree
        run: python scripts/scan_secrets.py --report
