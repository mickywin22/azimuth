name: Secret Scan

# Public-flip HARD gate (C1). Runs gitleaks over the FULL git history plus the
# pure-stdlib belt-and-suspenders scanner. Both must be CLEAN for the gate to
# pass. Enforced on every push / PR to main so the gate cannot rot after the
# repo goes public — a leaked key committed and reverted still trips it.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — gitleaks scans every commit, not just HEAD

      - name: gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # No GITLEAKS_LICENSE needed: this is a personal/public repo, not an org.

  stdlib-scan:
    name: stdlib secret scan (no-binary fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Pure-stdlib — no install. Scans every reachable blob + the working tree.
      # Exit 1 on any real secret blocks the merge / flip.
      - name: Run scan_secrets.py over history + working tree
        run: python scripts/scan_secrets.py --report

  privacy-scan:
    name: private-leakage scan (C1b — owner-private context)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Sibling of the secret scan: gitleaks finds leaked *credentials*; this
      # finds leaked *owner-private context* — the owner's home paths, personal
      # email, and local-machine hook commands that must not ship to a public
      # repo.
      #
      # The gate is split by scope on purpose:
      #  * WORKING TREE — the surface a push can newly introduce. A HARD finding
      #    here exits 1 and blocks the merge, so the fleet can never commit a new
      #    owner-private path. This is the rot-proof guarantee for the live repo.
      #  * HISTORY — pre-existing owner-private blobs (machine paths / local hooks,
      #    never credentials) are the documented C1c "accept-vs-scrub" call, which
      #    is a Michael go-gate at the flip and NEVER an autonomous history rewrite.
      #    Hard-failing every push on them made this gate red-by-design and killed
      #    its signal, so history HARD findings are surfaced NON-BLOCKING here. The
      #    full-history scan still runs at the flip via check_flip_readiness.py, so
      #    the flip itself stays protected.
      - name: Working-tree privacy gate (HARD-blocks the merge)
        run: python scripts/scan_private_leakage.py --worktree --report
      - name: History privacy report (C1c decision surface — non-blocking)
        if: always()
        continue-on-error: true
        run: python scripts/scan_private_leakage.py --history --report
