name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check guardrail/ ingest/ tests/ synthesis/ scripts/check_synthesis.py scripts/build_brief_index.py scripts/build_log.py scripts/check_synthesis_freshness.py

      - name: Ruff format check
        run: ruff format --check guardrail/ ingest/ tests/ synthesis/ scripts/check_synthesis.py scripts/build_brief_index.py scripts/build_log.py scripts/check_synthesis_freshness.py

  source-guardrail:
    name: Source Guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pure-stdlib check -- no dependency install needed. Blocks the build if any
      # surfaced WorldMonitor subset is missing a license / attribution / credit, or
      # carries an editorial-exclusion content class (investment / safety / political).
      - name: Per-source license + content guardrail
        run: python scripts/check_sources.py

  synthesis-lint:
    name: Synthesis Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pure-stdlib check -- no dependency install needed. Blocks the build if any L2
      # brief carries an unsourced claim, a dangling L1 link, an editorial-deny-list
      # phrasing, a bad/duplicated frontmatter, or a missing changelog. The diff guard
      # (curator must not edit L1) runs on PRs via the base ref.
      - name: L2 synthesis lint
        run: python scripts/check_synthesis.py

      - name: Brief index in sync
        run: python scripts/build_brief_index.py --check

      - name: Bundle log in sync
        run: python scripts/build_log.py --check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: mypy
        run: mypy guardrail/ ingest/ synthesis/ scripts/check_synthesis.py scripts/build_brief_index.py scripts/check_synthesis_freshness.py

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Coverage report
        run: pytest tests/ --cov=guardrail --cov=ingest --cov=synthesis --cov-report=term-missing --cov-fail-under=80
