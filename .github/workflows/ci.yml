name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check guardrail/ ingest/ tests/ synthesis/ scripts/check_synthesis.py scripts/build_brief_index.py scripts/check_synthesis_freshness.py scripts/build_graph.py scripts/build_rdf.py scripts/build_autonomy.py scripts/query_graph.py scripts/check_ingest_liveness.py scripts/scan_secrets.py scripts/check_doc_links.py scripts/check_doc_orphans.py scripts/seed_good_first_issues.py

      - name: Ruff format check
        run: ruff format --check guardrail/ ingest/ tests/ synthesis/ scripts/check_synthesis.py scripts/build_brief_index.py scripts/check_synthesis_freshness.py scripts/build_graph.py scripts/build_rdf.py scripts/build_autonomy.py scripts/query_graph.py scripts/check_ingest_liveness.py scripts/scan_secrets.py scripts/check_doc_links.py scripts/check_doc_orphans.py scripts/seed_good_first_issues.py

  source-guardrail:
    name: Source Guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pure-stdlib check -- no dependency install needed. Blocks the build if any
      # surfaced WorldMonitor subset is missing a license / attribution / credit, or
      # carries an editorial-exclusion content class (investment / safety / political).
      - name: Per-source license + content guardrail
        run: python scripts/check_sources.py

  synthesis-lint:
    name: Synthesis Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pure-stdlib check -- no dependency install needed. Blocks the build if any L2
      # brief carries an unsourced claim, a dangling L1 link, an editorial-deny-list
      # phrasing, a bad/duplicated frontmatter, or a missing changelog. The diff guard
      # (curator must not edit L1) runs on PRs via the base ref.
      - name: L2 synthesis lint
        run: python scripts/check_synthesis.py

      - name: Brief index in sync
        run: python scripts/build_brief_index.py --check

      - name: Knowledge graph in sync
        run: python scripts/build_graph.py --check

      - name: Autonomy counters in sync
        run: python scripts/build_autonomy.py --check

      # The good-first-issues catalog is generated from the ISSUES list in the seeder;
      # this fails if .github/GOOD_FIRST_ISSUES.md drifts from what flip-time seeding
      # would create, so the contributor on-ramp can never rot.
      - name: Good-first-issues catalog in sync
        run: python scripts/seed_good_first_issues.py --check

      # Pure-stdlib check -- no dependency install needed. Blocks the build if any
      # relative Markdown link (docs index, changelog, license split, brief index)
      # points at a missing file, so a dead link can never reach the public front door.
      - name: Documentation links resolve
        run: python scripts/check_doc_links.py

      # Companion to the link gate: proves every docs/ page is *reachable* from a
      # repo front door (README + community files), so no authored doc is orphaned
      # and undiscoverable on the public repo. Pure stdlib, no install.
      - name: Documentation has no orphans
        run: python scripts/check_doc_orphans.py

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # `.[ld]` (rdflib) so mypy can resolve scripts/build_rdf.py — the linked-data exporter
      # imports rdflib (a DEV/CI-only dep, never runtime). Same reason the test job adds it.
      - name: Install dependencies
        run: uv pip install --system -e ".[dev,ld]"

      - name: mypy
        run: mypy guardrail/ ingest/ synthesis/ scripts/check_synthesis.py scripts/build_brief_index.py scripts/check_synthesis_freshness.py scripts/build_graph.py scripts/build_rdf.py scripts/query_graph.py scripts/check_ingest_liveness.py scripts/scan_secrets.py scripts/check_doc_links.py scripts/check_doc_orphans.py scripts/build_autonomy.py scripts/seed_good_first_issues.py

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The test job also installs the `site` + `ld` extras: tests/unit/test_site_build.py
      # exercises synthesis/site_build.py (lazy Markdown import), and tests/unit/test_build_rdf.py
      # exercises scripts/build_rdf.py end-to-end (rdflib). Both deps are kept out of the
      # pure-stdlib runtime + the dev stack; without them those tests raise ModuleNotFoundError.
      - name: Install dependencies
        run: uv pip install --system -e ".[dev,site,ld]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Coverage report
        run: pytest tests/ --cov=guardrail --cov=ingest --cov=synthesis --cov-report=term-missing --cov-fail-under=80

  linked-data:
    name: Linked Data Export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # rdflib is the CI-only `ld` extra — the runtime stays pure-stdlib (dependencies = []).
      - name: Install linked-data tooling
        run: uv pip install --system -e ".[ld]"

      # Lift the vault/ OKF bundle into RDF via the Vault-LD OKF compatibility profile
      # (SPEC Appendix B): builds schema.ttl + data.ttl from the committed composed context,
      # validates both parse as well-formed Turtle, and fails the gate on any export error.
      # Honours the editorial held-theme exclusion (a held brief + its L1 notes never lift).
      - name: Export schema.ttl + data.ttl (validate)
        run: python scripts/build_rdf.py --check
