repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.10.0, fastapi>=0.115.0]
        args: [--ignore-missing-imports]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: source-guardrail
        name: Per-source license + content guardrail
        entry: python scripts/check_sources.py
        language: system
        pass_filenames: false
        files: ^(sources/registry\.json|CREDITS\.md|scripts/check_sources\.py|guardrail/)
      - id: synthesis-lint
        name: L2 synthesis lint (claim-sourcing, editorial, evolve, diff-guard)
        entry: python scripts/check_synthesis.py
        language: system
        pass_filenames: false
        files: ^(vault/02 Briefs/|vault/00 Rules/|synthesis/|scripts/check_synthesis\.py)
      - id: brief-index-sync
        name: L2 brief index in sync with briefs
        entry: python scripts/build_brief_index.py --check
        language: system
        pass_filenames: false
        files: ^(vault/02 Briefs/|sources/registry\.json|scripts/build_brief_index\.py)
